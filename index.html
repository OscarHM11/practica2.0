                { type: "select", q: "Representación de la tierra en esfera:", o: ["Globo terráqueo", "Mapa", "Plano", "Croquis"], c: "Globo terráqueo" },
                { type: "select", q: "¿Cuántas provincias tiene Costa Rica?", o: ["7", "5", "8", "10"], c: "7" },
                { type: "select", q: "Símbolo nacional del trabajo:", o: ["Carreta", "Venado", "Guaria", "Yigüirro"], c: "Carreta" },
                { type: "select", q: "Líneas imaginarias verticales:", o: ["Meridianos", "Paralelos", "Curvas", "Rectas"], c: "Meridianos" },
                { type: "select", q: "Costa Rica limita al Sur con:", o: ["Panamá", "Nicaragua", "Colombia", "Jamaica"], c: "Panamá" },
                { type: "select", q: "¿En qué provincia vive (según temario)?", o: ["Cartago", "San José", "Heredia", "Alajuela"], c: "Cartago" }
            ]
        };

        let currentSubj = "";
        let qs = [];
        let curIdx = 0;
        let score = 0;
        let currentSet = [];
        let matchSelected = null;
        let matchPairs = {};

        window.nav = (v) => {
            document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.initQuiz = (name) => {
            currentSubj = name;
            const pool = [...BANK[name]].sort(() => Math.random() - 0.5);
            qs = pool.slice(0, 20);
            currentSet = [...qs];
            start();
        };

        window.restartSame = () => {
            qs = [...currentSet];
            start();
        };

        const start = () => {
            curIdx = 0; score = 0;
            nav('quiz');
            draw();
        };

        const draw = () => {
            const q = qs[curIdx];
            document.getElementById('q-subject').innerText = currentSubj;
            document.getElementById('q-counter').innerText = `${curIdx + 1} de ${qs.length}`;
            document.getElementById('progress-bar').style.width = `${((curIdx + 1) / qs.length) * 100}%`;
            document.getElementById('q-text').innerText = q.q;
            
            const media = document.getElementById('q-media');
            if (q.media) {
                media.innerHTML = `<div class="svg-display">${DRAWINGS[q.media]}</div>`;
                media.classList.remove('hidden');
            } else {
                media.classList.add('hidden');
            }

            const area = document.getElementById('q-answers');
            const fb = document.getElementById('q-feedback');
            const btn = document.getElementById('btn-next');
            area.innerHTML = ""; fb.classList.add('hidden'); btn.classList.add('hidden');

            if (q.type === "select" || q.type === "media") {
                const opts = [...q.o].sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = "w-full p-5 rounded-2xl text-left glass font-bold border-2 border-transparent hover:border-indigo-500 transition-all";
                    b.innerText = opt;
                    b.onclick = () => validate(opt, q.c, b);
                    area.appendChild(b);
                });
            } else if (q.type === "match") {
                renderMatch(q);
            }
        };

        const renderMatch = (q) => {
            const area = document.getElementById('q-answers');
            area.innerHTML = `<div class="grid grid-cols-2 gap-4" id="match-container">
                <div class="space-y-2" id="left-side"></div>
                <div class="space-y-2" id="right-side"></div>
            </div>`;
            
            matchSelected = null;
            matchPairs = {};

            q.left.forEach(item => {
                const b = document.createElement('button');
                b.className = "match-btn glass font-bold";
                b.innerText = item;
                b.onclick = () => {
                    document.querySelectorAll('#left-side button').forEach(x => x.classList.remove('match-selected'));
                    b.classList.add('match-selected');
                    matchSelected = item;
                };
                document.getElementById('left-side').appendChild(b);
            });

            [...q.right].sort(() => Math.random() - 0.5).forEach(item => {
                const b = document.createElement('button');
                b.className = "match-btn glass font-bold";
                b.innerText = item;
                b.onclick = () => {
                    if(!matchSelected) return;
                    matchPairs[matchSelected] = item;
                    b.classList.add('match-linked');
                    document.querySelector('.match-selected').classList.add('match-linked');
                    matchSelected = null;
                    if(Object.keys(matchPairs).length === q.left.length) {
                        let cCount = 0;
                        for(let k in q.pairs) if(matchPairs[k] === q.pairs[k]) cCount++;
                        validateMatch(cCount === q.left.length);
                    }
                };
                document.getElementById('right-side').appendChild(b);
            });
        };

        const validate = (u, c, el) => {
            const fb = document.getElementById('q-feedback');
            const btn = document.getElementById('btn-next');
            const ok = u === c;

            fb.classList.remove('hidden');
            if (ok) {
                score++;
                fb.innerText = "¡CORRECTO! 🎯";
                fb.className = "mt-8 p-6 rounded-2xl border-l-8 bg-emerald-500/10 border-emerald-500 text-emerald-400 font-bold";
            } else {
                fb.innerText = `ERROR. Respuesta: "${c}".`;
                fb.className = "mt-8 p-6 rounded-2xl border-l-8 bg-rose-500/10 border-rose-500 text-rose-400 font-bold";
            }

            document.getElementById('q-answers').querySelectorAll('button').forEach(x => x.disabled = true);
            btn.classList.remove('hidden');
        };

        const validateMatch = (ok) => {
            const fb = document.getElementById('q-feedback');
            fb.classList.remove('hidden');
            if(ok) {
                score++;
                fb.innerText = "¡ASOCIE PERFECTO! 🌟";
                fb.className = "mt-8 p-6 rounded-2xl border-l-8 bg-emerald-500/10 border-emerald-500 text-emerald-400 font-bold";
            } else {
                fb.innerText = "ASOCIE INCORRECTO. Revisa bien los conceptos.";
                fb.className = "mt-8 p-6 rounded-2xl border-l-8 bg-rose-500/10 border-rose-500 text-rose-400 font-bold";
            }
            document.getElementById('btn-next').classList.remove('hidden');
        };

        window.nextQ = () => {
            if (curIdx < qs.length - 1) {
                curIdx++; draw();
            } else {
                finish();
            }
        };

        const finish = async () => {
            nav('results');
            const finalNota = Math.round((score / qs.length) * 100);
            document.getElementById('res-score').innerText = finalNota;
            
            if(user) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'resultados_2026'), {
                        uid: user.uid,
                        materia: currentSubj,
                        nota: finalNota,
                        fecha: new Date().toLocaleString(),
                        timestamp: serverTimestamp()
                    });
                    document.getElementById('cloud-sync').innerText = "✅ RESULTADOS GUARDADOS";
                } catch(e) {
                    document.getElementById('cloud-sync').innerText = "❌ ERROR AL GUARDAR";
                }
            }
        };

        const syncHistory = () => {
            const qry = query(collection(db, 'artifacts', appId, 'public', 'data', 'resultados_2026'), orderBy('timestamp', 'desc'));
            onSnapshot(qry, (snap) => {
                const body = document.getElementById('history-data');
                body.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const row = `
                        <tr class="hover:bg-white/5 transition border-b border-white/5">
                            <td class="p-4 text-xs text-slate-500">${d.fecha}</td>
                            <td class="p-4 font-bold text-indigo-400">${d.materia}</td>
                            <td class="p-4 font-black ${d.nota >= 70 ? 'text-emerald-400' : 'text-rose-400'}">${d.nota}</td>
                            <td class="p-4 text-xs">${d.nota >= 70 ? '✅ Aprobado' : '❌ Repasar'}</td>
                        </tr>
                    `;
                    body.insertAdjacentHTML('beforeend', row);
                });
            });
        };

    </script>
</body>
</html>
